<div class="container py-5">
  <div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
      
      <div class="text-center mb-4">
        <h1 class="display-6 fw-bold" style="color: #d97706;">
          <i class="fas fa-trophy me-2"></i>Bolão da Copa
        </h1>
        <p class="text-muted">Acesse para dar seus palpites</p>
      </div>

      <div class="card shadow-sm border-0" style="border-radius: 1rem;">
        <div class="card-body p-4">
          
          <h5 class="card-title mb-4 border-bottom pb-2" style="color: #78350f;">
            <i class="fas" [ngClass]="isLoginMode ? 'fa-sign-in-alt' : 'fa-user-plus'"></i>
            {{ isLoginMode ? 'Login' : 'Cadastro' }}
          </h5>

          <div *ngIf="successMessage" class="alert alert-success py-2 small text-center">
            {{ successMessage }}
          </div>
          <div *ngIf="errorMessage" class="alert alert-danger py-2 small text-center">
            {{ errorMessage }}
          </div>

          <form (ngSubmit)="onSubmit()">
            
            <div class="mb-3" *ngIf="!isLoginMode">
              <label class="form-label text-muted small fw-bold">Nome Completo</label>
              <input 
                type="text" 
                class="form-control" 
                name="name" 
                [(ngModel)]="credentials.name" 
                [required]="!isLoginMode" 
                placeholder="Ex: João da Silva">
            </div>

            <div class="mb-3">
              <label class="form-label text-muted small fw-bold">E-mail</label>
              <input 
                type="email" 
                class="form-control" 
                name="email" 
                [(ngModel)]="credentials.email" 
                required 
                placeholder="seu@email.com">
            </div>
            
            <div class="mb-4">
              <label class="form-label text-muted small fw-bold">Senha</label>
              <input 
                type="password" 
                class="form-control" 
                name="password" 
                [(ngModel)]="credentials.password" 
                required 
                placeholder="********">
            </div>
            
            <button type="submit" class="btn btn-warning w-100 fw-bold" style="background-color: #f59e0b; color: white;">
              {{ isLoginMode ? 'Entrar' : 'Cadastrar' }}
            </button>
          </form>

          <div class="mt-4 text-center small">
            <a href="javascript:void(0)" class="text-decoration-none text-muted fw-bold" (click)="toggleMode()">
              {{ isLoginMode ? 'Ainda não tem conta? Cadastre-se' : 'Já tem uma conta? Faça login' }}
            </a>
          </div>

        </div>
      </div>
      
    </div>
  </div>
</div>
