<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand text-warning" href="#">
      <i class="fas fa-trophy me-2"></i>Bolão da Copa
    </a>
    <button class="btn btn-outline-light btn-sm" (click)="logout()">
      <i class="fas fa-sign-out-alt"></i> Sair
    </button>
  </div>
</nav>

<div class="container py-2 single-col" style="max-width: 900px;">
  
  <h4 class="mb-4" style="color: #78350f;">
    <i class="fas fa-futbol me-2 text-warning"></i> Jogos Disponíveis
  </h4>

  <div class="alert alert-info text-center" *ngIf="matches.length === 0">
    Nenhum jogo cadastrado pelo administrador ainda.
  </div>

  <div class="row">
    <div class="col-md-6 mb-4" *ngFor="let match of matches">
      <div class="card shadow-sm h-100 border-0" style="border-radius: 1rem;">
        
        <div class="card-header bg-light text-center border-0 pt-3">
          <span class="badge" [ngClass]="{'bg-success': match.status === 'finished', 'bg-secondary': match.status !== 'finished'}">
            {{ match.status === 'finished' ? 'Encerrado' : 'Aberto para palpites' }}
          </span>
          <br>
          <small class="text-muted fw-bold">{{ match.matchDate | date:'dd/MM/yyyy HH:mm' }}</small>
        </div>
        
        <div class="card-body d-flex justify-content-center align-items-center">
          
          <div class="text-end" style="width: 100px;">
            <strong class="fs-5">{{ match.teamA }}</strong>
          </div>
          
          <div class="mx-3 d-flex align-items-center">
            <input type="number" class="form-control text-center mx-1 fs-5 fw-bold" style="width: 65px;" [(ngModel)]="match.myGuessA" [disabled]="match.status === 'finished'" min="0">
            <span class="fw-bold text-muted">X</span>
            <input type="number" class="form-control text-center mx-1 fs-5 fw-bold" style="width: 65px;" [(ngModel)]="match.myGuessB" [disabled]="match.status === 'finished'" min="0">
          </div>

          <div class="text-start" style="width: 100px;">
            <strong class="fs-5">{{ match.teamB }}</strong>
          </div>
          
        </div>
        
        <div class="card-footer bg-white border-0 pb-4 pt-0 text-center" *ngIf="match.status !== 'finished'">
          <button class="btn btn-success w-75" (click)="submitBet(match)">
            <i class="fas fa-save me-1"></i> Salvar Palpite
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
